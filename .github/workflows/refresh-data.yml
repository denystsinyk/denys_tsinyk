name: Refresh Data

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes (GitHub minimum is 5 min)

permissions:
  contents: write             # required for git push back to main

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch GitHub data
        run: node scripts/fetch-github-data.js
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_LOGIN: ${{ github.repository_owner }}

      - name: Fetch Steam data
        run: node scripts/fetch-steam-data.js
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: ${{ secrets.STEAM_ID }}

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          git diff --cached --quiet || git commit -m "chore: refresh data [skip ci]"
          git push
